server:
  port: 8081

spring:
  application:
    name: market-data-service
  datasource:
    url: jdbc:h2:mem:trading;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: never
